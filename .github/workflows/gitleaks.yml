name: gitleaks
on: [pull_request, push]
permissions:
  contents: read
jobs:
  scan:
    name: secret scan
    runs-on: ubuntu-latest
    env:
      # Pin; bump deliberately. The MIT-licensed gitleaks *binary* is used (not the
      # registration-gated gitleaks-action), per AGENTS.md rule 36 (free/OSS only).
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          # Save under the manifest filename so `sha256sum -c` (which reads the
          # name from the checksum line) can find and verify the file.
          curl -fsSL "${base}/${tarball}" -o "${tarball}"
          curl -fsSL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep "${tarball}" checksums.txt | sha256sum -c -
          tar -xzf "${tarball}" gitleaks
      - name: Scan full history
        # .gitleaks.toml carries the curated false-positive allowlist (ADR-G006).
        run: ./gitleaks git --config .gitleaks.toml --redact --verbose .   # fetch-depth: 0 gives full history
