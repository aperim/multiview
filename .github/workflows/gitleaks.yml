name: gitleaks
on: [pull_request, push]
permissions:
  contents: read
jobs:
  scan:
    name: secret scan
    runs-on: ubuntu-latest
    env:
      # Pin; bump deliberately. The MIT-licensed gitleaks *binary* is used (not the
      # registration-gated gitleaks-action), per AGENTS.md rule 36 (free/OSS only).
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSL "${base}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tgz
          curl -sSL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" checksums.txt | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
      - name: Scan full history
        # .gitleaks.toml carries the curated false-positive allowlist (ADR-G006).
        run: ./gitleaks git --config .gitleaks.toml --redact --verbose .   # fetch-depth: 0 gives full history
