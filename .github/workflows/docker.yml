name: docker

# Build BOTH app images (generic VAAPI/QSV + nvidia CUDA/NVENC), multi-arch, on
# NATIVE runners (no QEMU). Each (variant, arch) leg builds + pushes BY DIGEST; a
# per-variant `merge` job assembles the manifest, then attests provenance + SBOM
# (verifying they survived the merge) and signs (keyless cosign, --recursive).
# FFmpeg is NOT built here — it is pulled from the published base image
# ghcr.io/aperim/multiview-ffmpeg via the FFMPEG_IMAGE build-arg (see
# .github/workflows/ffmpeg-base.yml + deploy/Dockerfile.ffmpeg, ADR-0031 §5).
#
# On pull_request we BUILD ONLY (no login/push) so forks/PRs can't publish.

on:
  push:
    branches: [main]
    tags: ["v*"] # also matches pre-release tags (v1.2.3-rc.1 → RC images)
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  # Do NOT cancel an in-flight publish on a tag/main push (avoids half-pushed
  # digests with no manifest). Only cancel superseded PR (build-only) runs.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # aperim/multiview

permissions:
  contents: read

jobs:
  # ── per (variant, arch) build → push by digest ──────────────────────────────
  build:
    name: build (${{ matrix.variant }}/${{ matrix.arch }})
    # Heaviest leg in the repo: a full multi-stage Docker build (cargo release
    # build of the whole workspace inside the image) + push by digest, on native
    # amd64/arm64 runners. A cold build cache + arm64 native runner can run long;
    # 90min is generous headroom while still capping a wedged runner far below 6h.
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # generic (VAAPI/QSV) — both arches; FFmpeg base = …:8.1.1-lgpl.
          - variant: generic
            dockerfile: deploy/Dockerfile
            platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
            ffmpeg_image: ghcr.io/aperim/multiview-ffmpeg:8.1.1-lgpl
            features: "ffmpeg,linux-vaapi,web"
          - variant: generic
            dockerfile: deploy/Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
            ffmpeg_image: ghcr.io/aperim/multiview-ffmpeg:8.1.1-lgpl
            features: "ffmpeg,linux-vaapi,web"
          # nvidia (CUDA/NVENC) — amd64 ONLY until arm64 CUDA base + nv-codec are validated.
          - variant: nvidia
            dockerfile: deploy/Dockerfile.nvidia
            platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
            ffmpeg_image: ghcr.io/aperim/multiview-ffmpeg:8.1.1-nvidia
            features: "ffmpeg,nvidia,web"
    runs-on: ${{ matrix.runner }}
    outputs:
      # Variant-aware digest outputs (the two amd64 legs must not collide).
      digest-generic-amd64: ${{ steps.export.outputs.digest-generic-amd64 }}
      digest-generic-arm64: ${{ steps.export.outputs.digest-generic-arm64 }}
      digest-nvidia-amd64: ${{ steps.export.outputs.digest-nvidia-amd64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.2.0

      # Login + push only when NOT a pull_request (forks must not publish).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          # On PR: load nothing, just build. On push: push by digest only.
          push: ${{ github.event_name != 'pull_request' }}
          provenance: mode=max
          sbom: true
          # FFMPEG_IMAGE pulls the published FFmpeg base (COPY --from=ffmpeg);
          # CARGO_FEATURES is threaded identically into chef `cook` and `build`.
          build-args: |
            FFMPEG_IMAGE=${{ matrix.ffmpeg_image }}
            CARGO_FEATURES=${{ matrix.features }}
          # Registry cache (durable, cross-branch, unbounded) on push; GHA
          # read-only fallback always present for PRs/forks (no GHCR write).
          # Keyed per (variant, arch) so the two amd64 legs never collide.
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.variant }}-${{ matrix.arch }}
            type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: ${{ github.event_name != 'pull_request'
            && format('type=registry,ref={0}/{1}:buildcache-{2}-{3},mode=max,image-manifest=true,oci-mediatypes=true,compression=zstd', env.REGISTRY, env.IMAGE_NAME, matrix.variant, matrix.arch)
            || format('type=gha,scope={0}-{1},mode=max', matrix.variant, matrix.arch) }}
          outputs: ${{ github.event_name != 'pull_request' && format('type=image,name={0}/{1},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.IMAGE_NAME) || 'type=cacheonly' }}

      - name: Export digest
        id: export
        if: github.event_name != 'pull_request'
        run: echo "digest-${{ matrix.variant }}-${{ matrix.arch }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  # ── per-variant manifest merge + attest + sign ──────────────────────────────
  merge:
    name: merge ${{ matrix.variant }} + attest + sign
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    # No image build — imagetools manifest create + provenance/SBOM verify +
    # attest + keyless cosign sign. Network/registry-bound (a few min); 30min
    # absorbs a slow registry round-trip while failing a wedge fast.
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: generic
            suffix: "" # default tags: latest / <version>
            digests: '["${{ needs.build.outputs.digest-generic-amd64 }}","${{ needs.build.outputs.digest-generic-arm64 }}"]'
          - variant: nvidia
            suffix: "-nvidia" # latest-nvidia / <version>-nvidia
            digests: '["${{ needs.build.outputs.digest-nvidia-amd64 }}"]'
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=edge,branch=main

      - name: Create multi-arch manifest
        id: manifest
        env:
          DIGESTS: ${{ matrix.digests }}
          TAGS: ${{ steps.meta.outputs.tags }}
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${IMAGE_NAME}"
          # -t flags from the metadata-action tag list.
          TAG_ARGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS+=("-t" "$tag")
          done <<< "$TAGS"
          # Source refs from the variant's per-arch digests (1 for nvidia, 2 for generic).
          SRC=()
          while IFS= read -r d; do
            [ -n "$d" ] && SRC+=("${REF}@${d}")
          done < <(printf '%s' "$DIGESTS" | jq -r '.[]')
          if [ "${#SRC[@]}" -eq 0 ]; then
            echo "::error::no source digests for variant ${SUFFIX:-generic}"; exit 1
          fi
          docker buildx imagetools create "${TAG_ARGS[@]}" "${SRC[@]}"
          # Inspect via the FIRST tag from the metadata-action list: the action's
          # `version` output already carries the flavor suffix (e.g. `edge-nvidia`),
          # so appending ${SUFFIX} again composed a doubled `edge-nvidia-nvidia`
          # ref that does not exist and failed every nvidia merge on main.
          FIRST_TAG="$(head -n1 <<< "$TAGS")"
          DIGEST="$(docker buildx imagetools inspect "$FIRST_TAG" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Verify attestations survived the merge
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
          prov="$(docker buildx imagetools inspect "$REF" --format '{{json .Provenance}}')"
          sbom="$(docker buildx imagetools inspect "$REF" --format '{{json .SBOM}}')"
          if [ "$prov" = "null" ] || [ -z "$prov" ]; then echo "::error::merged manifest lost provenance"; exit 1; fi
          if [ "$sbom" = "null" ] || [ -z "$sbom" ]; then echo "::error::merged manifest lost SBOM"; exit 1; fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Keyless sign (recursive — signs per-arch child manifests too)
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: cosign sign --yes --recursive "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
