# examples/public-streams-2x2.toml — a 2x2 of REAL public streams.
#
# Deliberately heterogeneous to exercise the engine's normalization:
#   - ABC News  : HLS, H.264, 25 fps (PAL),     UNTAGGED color  (AU geo)
#   - CNN slate : HLS, H.264, 29.97 fps (NTSC),  BT.709 limited  (US geo)
#   - Frigate   : RTSP, HEVC, 50 fps,            BT.709 limited
#   - Mux BBB   : HLS, H.264, 60 fps,            untagged, 44.1 kHz audio
#
# Several streams are geo-restricted and may be unavailable. See
# docs/reference/example-streams.md for details + offline synthetic alternatives.
schema_version = 1

[canvas]
width = 1920
height = 1080
fps = "60000/1001"          # output cadence; inputs are resampled onto it
pixel_format = "nv12"
background = "#101014"

[canvas.color]
profile = "sdr-bt709-limited"   # all tiles normalized to this working space

[layout]
kind = "grid"
columns = ["1fr", "1fr"]
rows = ["1fr", "1fr"]
gap = 8
areas = ["abc cnn", "cam bbb"]

[[sources]]
id = "in_abc"
display_name = "ABC News (AU)"
kind = "hls"
url = "https://samples.example.net/abc-news.m3u8"
[sources.color_override]
# Untagged source: let detection apply the player-style default policy.
primaries = "auto"
transfer = "auto"
matrix = "auto"
range = "auto"

[[sources]]
id = "in_cnn"
display_name = "CNN slate (US)"
kind = "hls"
url = "https://news.example.net/hls/live/586495/cnngo/cnn_slate/VIDEO_0_3564000.m3u8"

[[sources]]
id = "in_cam"
display_name = "Frigate webcam (HEVC 50p)"
kind = "rtsp"
url = "rtsp://gpu-test-box.example.net:8554/webcam"
[sources.rtsp]
transport = "tcp"

[[sources]]
id = "in_bbb"
display_name = "Big Buck Bunny (Mux)"
kind = "hls"
url = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"

[[cells]]
id = "cell_abc"
area = "abc"
fit = "contain"
[cells.source]
input_id = "in_abc"
[[cells]]
id = "cell_cnn"
area = "cnn"
fit = "contain"
[cells.source]
input_id = "in_cnn"
[[cells]]
id = "cell_cam"
area = "cam"
fit = "cover"
[cells.source]
input_id = "in_cam"
[[cells]]
id = "cell_bbb"
area = "bbb"
fit = "contain"
[cells.source]
input_id = "in_bbb"

[[overlays]]
id = "ov_clock"
kind = "clock"
target = "canvas"
anchor = "bottom_right"
offset = { x = -20, y = -16 }
z = 100
format = "%H:%M:%S"
tz = "Australia/Sydney"
source = "wall"

[[outputs]]
kind = "rtsp_server"
mount = "/multiview"
codec = "h264"
latency_profile = "low_latency"

[[outputs]]
kind = "ll_hls"
path = "/hls/multiview"
codec = "h264"
part_target_ms = 250
segment_ms = 2000
gop_ms = 2000
