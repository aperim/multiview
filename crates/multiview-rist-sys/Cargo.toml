[package]
name = "multiview-rist-sys"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license-file.workspace = true
repository.workspace = true
authors.workspace = true
# Workspace-internal implementation crate; never published to crates.io
# (matches multiview-ndi-sys / xtask). Lets cargo-deny's allow-wildcard-paths
# exempt the intra-workspace path deps while still denying real "*" wildcards.
publish = false
description = "Direct librist (VSF TR-06, BSD-2-Clause) FFI leaf for RIST link STATISTICS (ADR-0095 Tier-1 / RIST-5). FFmpeg's rist:// protocol exposes no stats callback, so this crate runtime-loads librist (dlopen, NEVER linked at build time) and wires rist_stats_callback_set → a neutral stats sample. dlopen + the C-ABI stats decode are isolated here so multiview-output stays forbid(unsafe_code). librist is never vendored."

[dependencies]
# Runtime `dlopen`/`dlsym` of the host librist (`librist.so.4`/`.so`). There is
# NO build-time link to librist and the library is never vendored: this crate
# resolves the librist entry points at RUN time and reads them into a hand fn
# table (the ADR-0028 own-the-FFI-binding pattern, mirroring multiview-ndi-sys).
# So the default build — and even a `rist-stats` build — compiles and links
# WITHOUT librist present; only a run that actually opens a stats session needs
# the runtime `.so`. License: ISC (LGPL-clean), already in the workspace graph.
# This is the ONLY raw FFI dependency in the RIST stats path, and this leaf crate
# is the sole `unsafe` boundary so `multiview-output` stays `forbid(unsafe_code)`.
libloading = { workspace = true }
# Per-crate typed error enum (the workspace error convention).
thiserror = { workspace = true }
# The neutral telemetry stats sample the decoded C stats lower into. Pure types
# (no FFI); keeps the decode + the telemetry model in one place so the producer
# (the RIST sink) hands a `RistLinkSample` straight to the metrics surface.
multiview-telemetry = { workspace = true }

[features]
# The runtime-load + stats session path. OFF by default: the consumers'
# `rist-stats` feature pulls it. With the feature OFF the crate still compiles
# the pure C-ABI decode (offline-testable), but the `dlopen` session API is
# gated off so a default build links nothing and needs no librist present.
session = []

[dev-dependencies]
# Build a fake C-ABI stats blob in the offline decode tests.
# (no extra deps needed — the tests construct the repr(C) structs directly)

# FFI crate exception. The workspace forbids `unsafe_code`, and a `forbid` level
# can never be relaxed by a downstream manifest or inner attribute — so this crate
# cannot use `[lints] workspace = true`. Instead it restates the workspace lint set
# verbatim with the single change of `unsafe_code` from `forbid` to `deny`, so the
# raw `dlopen`/`dlsym` resolution + the C-ABI stats deref are allowed only with a
# justified `// SAFETY:` comment. Keep in sync with the root Cargo.toml lints.
[lints.rust]
unsafe_code = "deny"
unreachable_pub = "warn"
rust_2018_idioms = { level = "warn", priority = -1 }

[lints.clippy]
all      = { level = "deny",  priority = -2 }
pedantic = { level = "warn",  priority = -1 }
unwrap_used      = "deny"
expect_used      = "deny"
panic            = "deny"
todo             = "deny"
unimplemented    = "deny"
unreachable      = "deny"
get_unwrap       = "deny"
indexing_slicing = "deny"
as_conversions   = "deny"
exit             = "deny"
mem_forget       = "deny"
dbg_macro        = "deny"
print_stdout     = "deny"
print_stderr     = "deny"
str_to_string    = "deny"
missing_errors_doc = "warn"
missing_panics_doc = "warn"
must_use_candidate = "warn"
