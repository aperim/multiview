[package]
name = "multiview-webrtc"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license-file.workspace = true
repository.workspace = true
authors.workspace = true
# Workspace-internal implementation crate; never published to crates.io.
# Lets cargo-deny's allow-wildcard-paths exempt intra-workspace path deps while
# still denying real "*" version wildcards.
publish = false

[dependencies]
multiview-core = { workspace = true }
multiview-preview = { workspace = true, features = ["webrtc"] }
multiview-input = { workspace = true, features = ["webrtc"] }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
# OS-RNG-backed >=128-bit random session ids (ADR-0048 §8) and TURN transaction
# ids / ICE tie-breakers. `getrandom`-backed; `MIT OR Apache-2.0` (allowlisted),
# already in the workspace graph transitively. Pure-Rust, in the DEFAULT build —
# session-id minting and the TURN client codec are pure and CI-tested without
# any native dependency.
rand = "0.8"
# HMAC-SHA1 for STUN/TURN MESSAGE-INTEGRITY (RFC 5389 §15.4) and HMAC-SHA256 for
# coturn-style ephemeral REST credentials (the `turn_rest` username:credential
# derivation). RustCrypto, pinned; `MIT OR Apache-2.0` (already allowlisted in
# deny.toml via multiview-preview). Pure-Rust, in the DEFAULT build (the TURN
# client message codec + auth are pure and offline-tested).
hmac = "0.12.1"
sha1 = "0.10.6"
sha2 = "0.10.9"
md-5 = "0.10.6"
base64 = "0.22.1"
# Native WebRTC (ICE/DTLS/SRTP) stack — OPTIONAL, pulled in ONLY by `native`.
# str0m is sans-IO (`MIT OR Apache-2.0`), pinned EXACTLY to =0.16.2 (ADR-0048 §3,
# a tightening of multiview-preview's caret requirement; lockfile-resolved to the
# same version). `default-features = false, features = ["rust-crypto"]` selects
# the RustCrypto SRTP provider whose DTLS impl (`dimpl`) transitively links
# `aws-lc-rs` (`ISC AND (Apache-2.0 OR ISC)` — allowlisted) for the cert / EC
# primitives. The default + pure builds never link it; cargo-deny scans the
# default build only (`all-features = false`), so the gate stays clean.
str0m = { version = "=0.16.2", default-features = false, features = ["rust-crypto"], optional = true }
# The dual-stack UDP socket bind (`[::]`, `IPV6_V6ONLY=false`; ADR-0042/§4) — the
# std `UdpSocket` cannot set `IPV6_V6ONLY`. `socket2` (`MIT OR Apache-2.0`,
# allowlisted, already in the workspace graph transitively via tokio/hyper) gives
# the one syscall we need; OPTIONAL, pulled in ONLY by `native`, so the default
# build never links it.
socket2 = { version = "0.6", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros", "sync", "time", "net"] }

[features]
"default" = []
# The native ICE/DTLS/SRTP transport: the single dual-stack UDP socket, the
# str0m-backed session engine, and the driver task (ADR-0048 §4-§7). Everything
# that links str0m sits behind this gate, so the default build stays pure-Rust
# and deny-clean. `tokio/net` provides the UDP socket the driver and the TURN
# client own.
"native" = ["dep:str0m", "dep:socket2", "tokio/net"]

[[example]]
name = "whip_publish"
path = "examples/whip_publish.rs"
required-features = ["native"]

[lints]
workspace = true
