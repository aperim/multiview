# deploy/hls-nginx.conf — reference HLS fronting config (ADR-0032 §6, DEV-D1).
#
# The header contract a static front (nginx / traefik / CDN) must apply when it
# serves Multiview's HLS output directory. It mirrors exactly what Multiview's
# own delivery surface (`/hls/{output-id}/` on the control listener) applies:
#
#   * explicit Content-Type per extension (incl. the CMAF `.m4s` type that is
#     absent from stock nginx mime.types);
#   * Cache-Control tiers: playlists `max-age=1, must-revalidate` (a live
#     playlist mutates every segment), segments/init immutable for a year;
#   * Origin-reflecting CORS with `Vary: Origin` — NEVER a hardcoded `*`
#     wildcard. A Cast receiver is a browser app on a Google origin fetching
#     playlists/segments cross-origin; any browser player needs the same.
#     Requests without an Origin (normal players) get no CORS headers, because
#     `add_header` skips an empty value;
#   * preflight `OPTIONS` answered `204` with the allow set;
#   * Range/206 (nginx serves static files with `Accept-Ranges: bytes` and
#     single-range `206` natively; `Content-Length`/`Content-Range` are exposed
#     to cross-origin callers below).
#
# Mounted by deploy/compose.yaml into the `hls` sidecar as
# /etc/nginx/conf.d/default.conf.

# Reflect the request Origin only when one is present.
map $http_origin $hls_cors_origin {
    default "";
    "~.+"   $http_origin;
}

server {
    # IPv6-first dual-stack bind (conventions §10): lead [::], keep the
    # legacy-IPv4 listener alongside.
    listen [::]:80;
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # The HLS delivery surface serves ONLY these media types (anything else in
    # the output volume is not delivery surface — see `location /` below).
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
        video/iso.segment             m4s;
        video/mp4                     mp4;
        text/vtt                      vtt;
    }

    # Playlists: short-TTL tier (live playlists mutate every segment).
    location ~* \.m3u8$ {
        # NOTE: nginx `add_header` inheritance — a block that adds headers
        # REPLACES all inherited add_header directives, so each block carries
        # the full set.
        if ($request_method = OPTIONS) {
            add_header Vary Origin always;
            add_header Access-Control-Allow-Origin $hls_cors_origin always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Range, Accept-Encoding" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Cache-Control "max-age=1, must-revalidate" always;
        add_header Vary Origin always;
        add_header Access-Control-Allow-Origin $hls_cors_origin always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
    }

    # Segments + init + WebVTT segments: immutable tier (closed media never
    # changes; the segmenter never rewrites a published segment).
    location ~* \.(ts|m4s|mp4|vtt)$ {
        if ($request_method = OPTIONS) {
            add_header Vary Origin always;
            add_header Access-Control-Allow-Origin $hls_cors_origin always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Range, Accept-Encoding" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary Origin always;
        add_header Access-Control-Allow-Origin $hls_cors_origin always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
    }

    # Never serve non-HLS files that may share the output volume.
    location / {
        return 404;
    }
}
