# deploy/compose.yaml — Multiview quick-start (software / LGPL-clean image).
#
# Brings up three services:
#   * testsrc   — a MediaMTX RTSP server that, on init, runs ffmpeg to publish a
#                 SYNTHETIC `testsrc2` video + `sine` audio feed at
#                 rtsp://testsrc:8554/test. No real/private feeds.
#   * multiview — the Multiview engine: ingests that feed + 3 built-in test
#                 patterns into a 2x2 canvas, encodes once, writes HLS to a named
#                 volume, and serves the web UI + REST/WS API + OpenAPI/Scalar
#                 docs on :8080 (its config has a [control] section).
#   * hls       — a tiny nginx that serves the HLS volume over HTTP so you can
#                 open the stream in a player.
#
# Bring it up:   docker compose -f deploy/compose.yaml up -d
# Then open:     http://localhost:8080/             the web UI (manage the engine)
#                http://localhost:8080/docs          the Scalar API playground
#                http://localhost:8888/multiview.m3u8 the multiview (VLC / ffplay)
# Tear it down:  docker compose -f deploy/compose.yaml down -v
#
# The web UI + /api/v1 + /docs are served because the published image is built
# with the `web` feature (multiview-control/embed-web), so the SPA is embedded,
# and the mounted config (deploy/config/multiview.toml) has a [control] listener.
# `/`, `/docs`, and `/api/v1/openapi.json` are unauthenticated; every /api/v1
# data route needs `Authorization: Bearer admin.<secret>` where <secret> is
# MULTIVIEW_CONTROL_TOKEN (set below). The Scalar playground has an Auth field —
# paste `admin.<secret>` there to call write routes. The control plane is
# isolation-safe (invariant #10) and cannot back-pressure the output clock.
#
# GPU overlays (compose merges left-to-right; the GPU files swap the image +
# add device access):
#   docker compose -f deploy/compose.yaml -f deploy/compose.gpu-nvidia.yaml up -d
#   docker compose -f deploy/compose.yaml -f deploy/compose.gpu-vaapi.yaml  up -d
#
# NOTE: live RTSP / NDI / RTMP / SRT output *servers* are still on the roadmap —
# the engine composites + encodes + **writes HLS/file output to disk** (the `hls`
# sidecar serves it over HTTP). There is no live RTSP-server (:8554 here is the
# companion's *ingest* feed, not a Multiview output). See the README "Roadmap".

services:
  testsrc:
    # MediaMTX with a bundled ffmpeg; `runOnInit` publishes a synthetic feed.
    image: bluenviron/mediamtx:1.19.0-ffmpeg
    restart: unless-stopped
    environment:
      MTX_PROTOCOLS: tcp
      # Publish a synthetic 1280x720@30 testsrc2 + sine feed to the `test` path.
      MTX_PATHS_TEST_RUNONINIT: >-
        ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=30
        -f lavfi -i sine=frequency=1000:sample_rate=48000
        -pix_fmt yuv420p -c:v libx264 -preset veryfast -tune zerolatency -g 60
        -c:a aac -f rtsp rtsp://localhost:8554/test
      MTX_PATHS_TEST_RUNONINITRESTART: "yes"
    ports:
      # Exposed for host inspection (e.g. ffplay rtsp://localhost:8554/test).
      - "8554:8554"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8554 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  multiview:
    image: ghcr.io/aperim/multiview:latest
    restart: unless-stopped
    depends_on:
      testsrc:
        condition: service_started
    command: ["run", "/etc/multiview/multiview.toml"]
    environment:
      # Admin secret for the control plane. The presented bearer token is
      # `admin.${MULTIVIEW_CONTROL_TOKEN}`. Override for anything but local use:
      #   MULTIVIEW_CONTROL_TOKEN=$(openssl rand -hex 32) docker compose ... up -d
      # If you remove this, the server generates a token and logs it once at
      # startup (`docker compose logs multiview` to read it).
      MULTIVIEW_CONTROL_TOKEN: "${MULTIVIEW_CONTROL_TOKEN:-local-dev-change-me}"
    ports:
      # The control plane: web UI at /, REST at /api/v1, OpenAPI at
      # /api/v1/openapi.json, Scalar docs at /docs. Served because the image is
      # built with the `web` feature and the config has a [control] listener.
      - "8080:8080"
    volumes:
      # The quick-start config (read-only) and the HLS output (named volume).
      - ./config/multiview.toml:/etc/multiview/multiview.toml:ro
      - multiview-hls:/var/lib/multiview/hls
    healthcheck:
      # Real liveness: the HLS playlist must have been written in the last 30s
      # (the segmenter rewrites it every segment), proving the output clock is
      # still producing. Uses only coreutils (stat/date/test), present in the
      # debian-slim runtime. start_period covers ingest + prime + first segment.
      test:
        - "CMD"
        - "sh"
        - "-c"
        - "f=/var/lib/multiview/hls/multiview.m3u8; test -f \"$$f\" && [ $$(( $$(date +%s) - $$(stat -c %Y \"$$f\") )) -lt 30 ]"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4g
        reservations:
          cpus: "1.0"
          memory: 1g

  hls:
    # Serve the HLS output volume over HTTP. Open http://localhost:8888/multiview.m3u8
    # in VLC/ffplay. (The default LGPL image encodes mpeg2video — use VLC; for
    # browser/H.264 playback use the `-gpl` image, see the README.)
    image: nginx:1-alpine
    restart: unless-stopped
    depends_on:
      - multiview
    volumes:
      - multiview-hls:/usr/share/nginx/html:ro
    ports:
      - "8888:80"

volumes:
  multiview-hls:
